# shoshin.conf
# copy to ~/.config/shoshin/shoshin.conf
# reload at runtime: super+shift+r

# colors (ARGB hex, no 0x prefix)
background_color            = ff111111
outer_border_color_inactive = ffffffea
inner_border_color_inactive = ffddbd8c
outer_border_color_active   = ffffffea
inner_border_color_active   = ffc99043
outer_border_width          = 4
inner_border_width          = 4
select_box_color            = ffffffff
select_box_border           = 2

# cursor: nein (built-in bitmap) or swc (system theme)
cursor_theme = nein

# terminal
term                     = st-wl
term_flag                = -w
select_term_app_id       = st-wl-256color
enable_terminal_spawning = true
terminal_app_id          = havoc
terminal_app_id          = st-wl
terminal_app_id          = alacritty

# timing
targethz               = 60
chord_click_timeout_ms = 250

# movement
move_scroll_edge_threshold = 80
move_scroll_speed          = 16
move_ease_factor           = 0.30

# scrolling
scrollpx         = 64
scrollease       = 4
scrollcap        = 64
scroll_drag_mode = true

# features
enable_zoom  = true
focus_center = true

# 2-1 chord (left held + middle press): sticky / fullscreen / jump
chord21 = jump

# bar
bar_height       = 20
bar_bg           = ff1a1a1a
bar_fg           = ffcccccc
bar_ws_active_bg = ff4488cc
bar_ws_active_fg = ffffffff
bar_font         = monospace:size=9
